- photo: photos/filles.png
  base: base-luna.png
  modifications: 'coiffure : DEUX nattes (tresses), une de chaque côté ; tout le reste
    strictement identique, y compris la robe corail à petite tête de chien'
  tenue: robe corail toute douce avec une petite tête de chien beige sur le poitrail,
    chaussures blanches
description_paire: 'Les DEUX enfants sont des jumelles identiques : même visage, mêmes
  cheveux, entièrement fidèles aux images de référence. On les distingue par la coiffure
  et la tenue : la PREMIÈRE jumelle a UNE seule natte et porte la robe vert d''eau
  à petite tête de koala (première image de référence) ; la SECONDE a DEUX nattes
  et porte la robe corail à petite tête de chien (deuxième image de référence). Reproduire
  fidèlement ces deux personnages.'
